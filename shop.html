<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>


</div>
  <!-- HEADER -->
  <header class="shop-header">
    <div class="container header-content">
      <h1 class="logo">My Store</h1>

      <div class="header-actions">
        <input type="text" id="searchInput" class="input search-input" placeholder="Search products...">

        <button class="cart-button" onclick="toggleCart()">
          <span id="cartCount" class="cart-count">0</span>
        </button>
      </div>
    </div>
  </header>
  <div class="shop-topbar">

  <div class="shop-user-box">
    <div class="shop-user-avatar">
      ${currentUser.fullName.charAt(0)}
    </div>

    <div class="shop-user-info">
      <h4 id="userGreeting"></h4>
      <p id="userEmail"></p>
    </div>
  </div>

  <div class="shop-topbar-actions">
    <button onclick="logoutUser()" class="shop-logout-btn">
      Logout
    </button>
  </div>


  <!-- HERO -->
  <section class="hero-section">
    <div class="container hero-content">
      <h2>Discover Our Products</h2>
      <p>Browse premium items with modern design and instant checkout flow.</p>
    </div>
  </section>



  <!-- SHOP GRID -->
  <main class="container">
    <div id="productGrid" class="product-grid"></div>
  </main>


  <!-- OVERLAY -->
  <div id="overlay" class="overlay" onclick="toggleCart()"></div>

  <script src="shop.js"></script>
</body>
</html>
