<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders</title>

  <link rel="stylesheet" href="orders.css">
</head>
<body>

  <section class="orders-page">
    <div class="orders-container">

      <!-- HEADER -->
      <div class="orders-header">
        <h1 class="orders-title">My Orders</h1>
        <p class="orders-subtitle">
          Track all your recent purchases, shipping progress, and order details in one place.
        </p>
      </div>

      <!-- ORDER GRID -->
      <div id="ordersGrid" class="orders-grid">

        <!-- ORDER CARD -->
        <div class="order-card">

          <div class="order-top">
            <div>
              <h2 class="order-id">ORD-1743939201</h2>
              <p class="order-date">Placed on April 2, 2026</p>
            </div>

            <div class="order-status status-shipped">
              Shipped
            </div>
          </div>

          <div class="order-items">

            <div class="order-item">
              <img src="https://via.placeholder.com/100" alt="Product">

              <div class="order-item-details">
                <div class="order-item-name">Premium Headphones</div>
                <div class="order-item-meta">Qty: 1 • $120</div>
              </div>
            </div>

            <div class="order-item">
              <img src="https://via.placeholder.com/100" alt="Product">

              <div class="order-item-details">
                <div class="order-item-name">Smart Watch</div>
                <div class="order-item-meta">Qty: 2 • $85</div>
              </div>
            </div>

          </div>

          <div class="order-footer">
            <div>
              <div class="order-total-label">Total</div>
              <div class="order-total">$290</div>
            </div>
          </div>

          <div class="order-progress">
            <div class="progress-step active">
              <div class="progress-dot">✓</div>
              <div class="progress-label">Pending</div>
            </div>

            <div class="progress-step active">
              <div class="progress-dot">✓</div>
              <div class="progress-label">Paid</div>
            </div>

            <div class="progress-step active">
              <div class="progress-dot">✓</div>
              <div class="progress-label">Shipped</div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </section>

  <script src="orders.js"></script>
</body>
</html>
