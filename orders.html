<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  
   <nav class="admin-sidebar">
    <ul class="sidebar-menu">
      <li>
        <a href="admin-dashboard.html" class="sidebar-link active">
<span>dashboard</span>
        </a>
      </li>

      <li>
        <a href="index.html" class="sidebar-link"><span>shop</span>
        </a>
      </li>
    </ul>
    

  <div class="sidebar-bottom">
    <button class="logout-btn" onclick="logoutAdmin()">
      <span>logout</span>
    </button>
  </div>

</nav>

<div class="main-content">
<section class="customer-orders-page">

  <div class="orders-header">
    <div>
      <h1>My Orders</h1>
      <p>Track your purchases, delivery progress, and payment status.</p>
    </div>

    <div class="orders-search-box">
      <input type="text" id="orderSearchInput" placeholder="Search by order ID or product name">
    </div>
  </div>

  <div class="orders-summary-grid">

    <div class="summary-card">
      <span>Total Orders</span>
      <h2 id="totalOrdersCount">0</h2>
    </div>

    <div class="summary-card">
      <span>Pending Orders</span>
      <h2 id="pendingOrdersCount">0</h2>
    </div>

    <div class="summary-card">
      <span>Delivered Orders</span>
      <h2 id="deliveredOrdersCount">0</h2>
    </div>

    <div class="summary-card">
      <span>Total Spent</span>
      <h2 id="totalSpentAmount">$0</h2>
    </div>

  </div>

  <div id="customerOrdersGrid" class="customer-orders-grid"></div>

</section>

</div>
  <script src="orders.js"></script>
</body>
</html>
