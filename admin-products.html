      <span>logout</span>
    </button>

</nav>

<div class="main-content">


<h1>Product Manager</h1>

<div class="form">
  <input type="text" id="pName" class="input" placeholder="Product Name">
  <input type="number" id="pPrice" class="input" placeholder="Price">
  <input type="number" id="pStock" class="input" placeholder="Stock">

  <!-- Image Picker -->
  <label class="upload-box">
    <input type="file" id="pImage" accept="image/*" hidden>
    <span>Select Product Image</span>
  </label>

  <!-- Preview -->
  <div class="image-preview">
    <img id="previewImage" src="" alt="">
  </div>

  <button class="btn btn-primary" onclick="addProduct()">Add Product</button>
</div>
<div id="productList">
</div>
</div

<script src="admin-products.js"></script>


  <script>
    const imageInput = document.getElementById('pImage');
    const previewContainer = document.getElementById('previewContainer');
    const previewImage = document.getElementById('previewImage');
    const fileName = document.getElementById('fileName');

    imageInput.addEventListener('change', function () {
      const file = this.files[0];

      if (file) {
        const reader = new FileReader();

        reader.onload = function (e) {
          previewImage.src = e.target.result;
          previewContainer.style.display = 'block';
          fileName.textContent = file.name;
        };

        reader.readAsDataURL(file);
      }
    });
  </script>


</body>
